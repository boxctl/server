<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Boxctl</title>
        <link rel="shortcut icon" href="./icon.svg" type="image/svg+xml" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            :root {
                --bg-color: #fafafa;
                --text-color: #0a0a0a;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg-color: #0a0a0a;
                    --text-color: #fafafa;

                    color-scheme: dark;
                }
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background-color: var(--bg-color);
                color: var(--text-color);
                padding: 24px;
            }
            svg {
                height: auto;
                width: 100%;
                max-width: 192px;
            }
        </style>
    </head>

</html>
