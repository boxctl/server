upstream __DOMAIN___backend {
    server 127.0.0.1:8008;
    keepalive 64;
}

server {
    listen 80;
    server_name __DOMAIN__;
    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 443 ssl;
    listen 443 quic;

    server_name __DOMAIN__;
    
    acme letsencrypt;
    ssl_certificate $acme_cert_letsencrypt;
    ssl_certificate_key $acme_cert_key_letsencrypt;

    add_header Alt-Svc 'h3=":443"; ma=86400';

    location / {
        proxy_pass http://__DOMAIN___backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
