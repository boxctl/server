map $http_cf_connecting_ip $real_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

resolver __RESOLVER__ valid=300s ipv6=off;
resolver_timeout 5s;

acme_client letsencrypt https://acme-v02.api.letsencrypt.org/directory;

server {
    listen 80 default_server;
    server_name _;
    root /etc/angie/html/default;
    location / {
        try_files /index.html =444;
    }
}
